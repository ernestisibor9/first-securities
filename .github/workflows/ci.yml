name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

  update:
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: 20.0.0
          token: ${{ secrets.EXPO_TOKEN }}
          eas-cache: true

      - name: Install dependencies
        run: npm ci

      - name: Publish Update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: 1
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MSG" == *"[skip-update]"* ]]; then
            echo "Skipping update per [skip-update] tag in commit message"
            exit 0
          fi

          FIRST_LINE="${COMMIT_MSG%%$'\n'*}"
          if [[ "$FIRST_LINE" =~ ^\[release\]\ (.+)$ ]]; then
            MESSAGE="Auto-update: ${BASH_REMATCH[1]}"
          else
            MESSAGE="Auto-update: Improvements and bug fixes"
          fi

          npx eas-cli update --channel preview --platform all --message "$MESSAGE" --non-interactive
